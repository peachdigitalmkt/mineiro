<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Grupo PEACH - Prospecção</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #151515; color: #F5F5F5; font-family: 'Roboto', sans-serif;
        margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
      }
      .container { max-width: 500px; width: 100%; text-align: center; }
      
      /* Estilos da Marca */
      .logo { width: 90px; margin-bottom: 5px; }
      h1 { font-family: 'Montserrat', sans-serif; color: #F5F5F5; font-size: 26px; margin: 0 0 5px 0; }
      h1 span { color: #F23005; }
      p.slogan { color: #A0A0A0; font-size: 10px; margin-bottom: 30px; letter-spacing: 1px; font-family: 'Montserrat', sans-serif;}
      
      /* Elementos interativos */
      .btn-peach {
        background-color: #F23005; color: #F5F5F5; border: none; padding: 15px 20px;
        font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 16px;
        border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 15px;
      }
      textarea {
        background-color: #222; color: #F5F5F5; border: 2px solid #333; border-radius: 8px;
        width: 100%; height: 160px; padding: 15px; font-family: 'Roboto', sans-serif;
        font-size: 14px; box-sizing: border-box; margin-bottom: 15px; resize: none;
      }
      textarea:focus { border-color: #F23005; outline: none; }
      
      /* Telas de estado */
      #loading { color: #F23005; font-weight: 500; margin-top: 40px; font-size: 16px; }
      #tela-vazia { margin-top: 40px; display: none; }
      #tela-vazia h2 { color: #A0A0A0; font-weight: 400; font-size: 16px; line-height: 1.5; }
      #tela-ativa { margin-top: 10px; display: none; }
      #nomePlanilha { color: #4CAF50; font-size: 12px; margin-bottom: 15px; font-weight: bold; font-family: 'Montserrat', sans-serif; }
      .status { font-weight: 500; font-size: 14px; margin-top: 10px; color: #4CAF50; }
      /* Estilos da Tela de Login Customizada */
      #login-modal {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-color: #151515; display: flex; flex-direction: column;
        justify-content: center; align-items: center; z-index: 1000;
      }
      .input-senha {
        background-color: #222; color: #F5F5F5; border: 2px solid #333;
        border-radius: 8px; width: 80%; max-width: 300px; padding: 15px;
        font-size: 16px; margin-bottom: 15px; text-align: center;
        font-family: 'Roboto', sans-serif;
      }
      .input-senha:focus { border-color: #F23005; outline: none; }
      /* ESTILOS DO ACORDEÃO E CHECK */
      #containerLotes { margin-bottom: 20px; }
      .accordion {
        background-color: #222; color: #F5F5F5; cursor: pointer; padding: 15px;
        width: 100%; border: none; text-align: left; outline: none; font-size: 14px;
        transition: 0.3s; border-radius: 8px; margin-bottom: 8px;
        display: flex; justify-content: space-between; align-items: center;
        font-family: 'Montserrat', sans-serif; font-weight: bold; border: 1px solid #333;
      }
      .accordion.active, .accordion:hover { border-color: #F23005; background-color: #2a2a2a; }
      .panel {
        padding: 0 15px; background-color: #1a1a1a; max-height: 0;
        overflow: hidden; transition: max-height 0.3s ease-out; border-radius: 0 0 8px 8px;
      }
      .btn-copiar-lote {
        background-color: #4CAF50; color: white; border: none; padding: 12px;
        border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: bold;
        margin-top: 10px; margin-bottom: 15px; width: 100%; font-family: 'Montserrat', sans-serif;
      }
      .check-circle {
        height: 18px; width: 18px; border-radius: 50%; border: 2px solid #555;
        display: inline-block; transition: 0.3s; position: relative;
      }
      .check-circle.checked { background-color: #4CAF50; border-color: #4CAF50; }
      .check-circle.checked::after {
        content: "✓"; color: white; position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%); font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div id="login-modal">
      <img src="icon.png" alt="Logo Grupo PEACH" class="logo">
      <h2 style="color: #F5F5F5; font-family: 'Montserrat', sans-serif; margin-bottom: 20px;">Acesso <span style="color: #F23005;">Restrito</span></h2>
      <input type="password" id="inputSenha" class="input-senha" placeholder="Digite a senha mestra">
      <button class="btn-peach" style="max-width: 300px;" onclick="tentarLogin()">ENTRAR NO SISTEMA</button>
      <div id="msgLogin" class="status" style="color: #F23005;"></div>
    </div>
    <div class="container">
      <img src="icon.png" alt="Logo Grupo PEACH" class="logo">
      <h1>Grupo<span>PEACH</span></h1>
      <p class="slogan">ONDE VISIBILIDADE ENCONTRA RESULTADOS</p>
      
      <div id="loading">Sincronizando com o Drive...</div>

      <div id="tela-vazia">
        <h2 id="msgVazia">Quando o robô extrair uma planilha, você poderá copiar os lotes aqui.</h2>
      </div>

      <div id="tela-ativa">
        <div id="nomePlanilha"></div>
        
        <div id="containerLotes"></div>
        
        <p style="text-align: left; font-size: 12px; color: #A0A0A0; margin-top: 20px; font-family: 'Montserrat', sans-serif; font-weight: bold;">
          COLE TODAS AS ANÁLISES DO GEMINI ABAIXO:
        </p>
        <textarea id="respostaGemini" placeholder="Pode colar as análises de vários lotes aqui, uma embaixo da outra..." style="height: 350px; resize: vertical; overflow-y: auto;"></textarea>
        
        <button class="btn-peach" onclick="devolverAnalise()">SALVAR TUDO NA PLANILHA</button>
        
        <div id="msgStatus" class="status"></div>
      </div>
    </div>

    <script>
      // --- COLE SUA NOVA URL GERADA AQUI ---
      const API_URL = "https://script.google.com/macros/s/AKfycbyt1G38EioD4R5Cl7bY3xyYR5dGZ2YWLlcneMlP9VgwhRxi9D6Cm7KjcwZ3MAdUbSlmkA/exec"; 
      
      let idPlanilhaAtual = "";
      let linhasAtuais = [];
      let textoLoteAtual = "";
      let senhaSessao = "";

      // Quando o app abre, ele já puxa tudo sozinho
      // Oculta o app principal e mostra apenas o modal de login ao abrir
      window.onload = function() {
        document.querySelector('.container').style.display = 'none';
      };

      // Nova função que faz o papel do cofre com a senha invisível
      async function tentarLogin() {
        senhaSessao = document.getElementById("inputSenha").value;
        if (!senhaSessao) {
          document.getElementById("msgLogin").innerText = "Por favor, digite a senha.";
          return;
        }

        document.getElementById("msgLogin").innerText = "Verificando cofre...";
        document.getElementById("msgLogin").style.color = "#F5F5F5";

        try {
          const res = await fetch(`${API_URL}?acao=verificar_ou_buscar&senha=${encodeURIComponent(senhaSessao)}`);
          const retorno = await res.json();
          
          if (retorno.erro) {
             document.getElementById("msgLogin").innerText = "Senha Incorreta. Tente novamente.";
             document.getElementById("msgLogin").style.color = "#F23005";
             document.getElementById("inputSenha").value = ""; // Limpa o campo para digitar de novo
          } else {
             // Se a senha estiver certa, esconde o login e mostra o App!
             document.getElementById("login-modal").style.display = "none";
             document.querySelector('.container').style.display = "block";
             document.getElementById("loading").style.display = "none";

             if (retorno.status === "vazio") {
               document.getElementById("tela-vazia").style.display = "block";
               if (retorno.msg) document.getElementById("msgVazia").innerText = retorno.msg;
             } else if (retorno.status === "pronto") {
               document.getElementById("tela-ativa").style.display = "block";
               idPlanilhaAtual = retorno.id;
               linhasAtuais = retorno.linhas;
               document.getElementById("nomePlanilha").innerText = "EXTRAINDO DE: " + retorno.nome.toUpperCase();
               
               // GERA OS ACORDEÕES DINAMICAMENTE
               let htmlLotes = "";
               retorno.lotes.forEach((loteTxt, index) => {
                 htmlLotes += `
                   <button class="accordion" onclick="abrirAcordeao(this)">
                     <span>LOTE ${index + 1}</span>
                     <div class="check-circle" id="check-${index}"></div>
                   </button>
                   <div class="panel">
                     <textarea readonly style="height:100px; margin-top:10px; font-size:11px; background:#111;">${loteTxt}</textarea>
                     <button class="btn-copiar-lote" onclick="executarCopia(${index}, this)">COPIAR ESTE LOTE</button>
                   </div>
                 `;
               });
               document.getElementById("containerLotes").innerHTML = htmlLotes;
             }
          }
        } catch (e) {
          document.getElementById("msgLogin").innerText = "Erro de conexão com o Drive.";
          document.getElementById("msgLogin").style.color = "#F23005";
        }
      }
      function abrirAcordeao(btn) {
        btn.classList.toggle("active");
        let panel = btn.nextElementSibling;
        panel.style.maxHeight = panel.style.maxHeight ? null : panel.scrollHeight + "px";
      }

      function executarCopia(index, btn) {
        let textoLote = btn.previousElementSibling.value;
        navigator.clipboard.writeText(textoLote);
        
        // Ativa a bolinha verde
        document.getElementById("check-" + index).classList.add("checked");
        
        // Efeito visual no botão
        btn.innerText = "COPIADO COM SUCESSO!";
        setTimeout(() => { btn.innerText = "COPIAR ESTE LOTE"; }, 2000);
      }

      async function devolverAnalise() {
        const texto = document.getElementById("respostaGemini").value;
        if (!texto || linhasAtuais.length === 0) return alert("Cole a resposta do Gemini primeiro.");
        
        document.getElementById("msgStatus").innerText = "Salvando no Drive e atualizando...";
        document.getElementById("msgStatus").style.color = "#F5F5F5";

        try {
          const res = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ acao: "salvar", id: idPlanilhaAtual, texto: texto, linhas: linhasAtuais, senha: senhaSessao })
          });
          const msg = await res.text();
          
          // Recarrega a página para puxar os próximos 10 automaticamente
          location.reload(); 
        } catch (e) {
          document.getElementById("msgStatus").innerText = "Erro ao salvar.";
          document.getElementById("msgStatus").style.color = "#F23005";
        }
      }
    </script>
  </body>
</html>
